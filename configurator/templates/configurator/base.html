<!DOCTYPE html>
<html lang="ka" class="h-full antialiased selection:bg-fx-cyan/30 selection:text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechForge // Core Configurator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fx: {
                            bg: '#05060a',
                            surface: '#0a0c14',
                            card: '#0e1119',
                            border: '#1c2030',
                            borderBright: '#343a52',
                            cyan: '#00f0ff',
                            violet: '#9b5cff',
                            pink: '#ff3fb0',
                            green: '#39ff8f',
                            red: '#ff4d6d',
                            ink: '#f2f4fa',
                            inkDim: '#8d93ad'
                        }
                    },
                    fontFamily: {
                        display: ['"Orbitron"', 'sans-serif'],
                        body: ['"Inter"', 'sans-serif'],
                        data: ['"JetBrains Mono"', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #05060a;
            background-image:
                radial-gradient(ellipse 900px 500px at 15% 0%, rgba(0, 240, 255, 0.13) 0%, transparent 60%),
                radial-gradient(ellipse 900px 600px at 90% 30%, rgba(155, 92, 255, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 800px 500px at 50% 100%, rgba(255, 63, 176, 0.08) 0%, transparent 60%),
                linear-gradient(rgba(28, 32, 48, 0.35) 1px, transparent 1px),
                linear-gradient(90deg, rgba(28, 32, 48, 0.35) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 32px 32px, 32px 32px;
            background-attachment: fixed;
        }

        .font-display { font-family: 'Orbitron', sans-serif; letter-spacing: 0.02em; }
        .data-text { font-family: 'JetBrains Mono', monospace; }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #05060a; }
        .custom-scroll::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #00f0ff, #9b5cff); border-radius: 4px; }

        .rgb-text { background: linear-gradient(90deg, #00f0ff, #9b5cff 50%, #ff3fb0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .glass-card { background: rgba(14, 17, 25, 0.75); border: 1px solid #1c2030; backdrop-filter: blur(16px); }
        .glass-card:hover { border-color: #343a52; transform: translateY(-4px); transition: all 0.3s ease; }

        .rgb-btn { background: linear-gradient(90deg, #00f0ff, #9b5cff, #ff3fb0); background-size: 200% 100%; transition: 0.3s; }
        .rgb-btn:hover { background-position: 100% 0; }

        .neon-btn { background: rgba(0, 240, 255, 0.05); border: 1px solid rgba(0, 240, 255, 0.35); color: #00f0ff; transition: 0.3s; }
        .neon-btn:hover { background: rgba(0, 240, 255, 0.12); border-color: #00f0ff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
    </style>
</head>
<body class="text-fx-ink min-h-screen custom-scroll font-body">

    <nav class="border-b border-fx-border bg-fx-bg/70 backdrop-blur-2xl px-6 lg:px-12 py-4 flex justify-between items-center sticky top-0 z-40">
        <a href="{% url 'index' %}" class="flex items-center gap-3 font-display text-sm font-black tracking-[0.35em] text-white">
            <span class="w-3 h-3 bg-fx-cyan rounded-sm shadow-[0_0_10px_#00f0ff]"></span>
            TECH<span class="rgb-text">FORGE</span>
        </a>

        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="neon-btn text-[10px] font-display font-bold px-6 py-2.5 tracking-[0.2em] uppercase rounded-lg">
                კონფიგურატორი 🛠️
            </button>
            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}" class="text-[10px] data-text border border-fx-red/30 px-4 py-2.5 text-fx-red/90 rounded-lg">გამოსვლა</a>
            {% else %}
                <a href="{% url 'login' %}" class="text-[10px] data-text text-fx-inkDim">შესვლა</a>
                <a href="{% url 'register' %}" class="rgb-btn text-[10px] font-display font-bold px-5 py-2.5 rounded-lg text-black">რეგისტრაცია</a>
            {% endif %}
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-12" id="matrix-viewport">
        {% block content %}
        {% endblock %}
    </main>

    <div id="panel-sidebar" class="fixed inset-y-0 right-0 w-full sm:w-[460px] bg-fx-surface/95 backdrop-blur-2xl border-l border-fx-border z-50 transform translate-x-full transition-transform duration-300">
        <div class="p-6 border-b border-fx-border flex justify-between items-center bg-fx-bg/50">
            <h3 class="font-display text-xs font-bold text-white tracking-widest uppercase">ჩემი კონფიგურაცია</h3>
            <button onclick="toggleSidebar()" class="text-2xl text-fx-inkDim hover:text-white">&times;</button>
        </div>
        <div id="sidebar-async-target" class="p-6 overflow-y-auto custom-scroll text-xs">
            {% include 'configurator/sidebar_content.html' %}
        </div>
    </div>
    <div id="panel-backdrop" class="fixed inset-0 bg-black/70 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 z-40" onclick="toggleSidebar()"></div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('panel-sidebar');
            const backdrop = document.getElementById('panel-backdrop');
            sidebar.classList.toggle('translate-x-full');
            backdrop.classList.toggle('opacity-0');
            backdrop.classList.toggle('pointer-events-none');
        }

        function setLoaderState(loading) {
            // Loader state logic stripped to ensure instant UI response
            return;
        }

        function updateDOMGrid(htmlPayload) {
            const domParser = new DOMParser();
            const sourceDoc = domParser.parseFromString(htmlPayload, 'text/html');
            const nodes = ['main', '#dynamic-alerts', '#sidebar-async-target'];
            
            nodes.forEach(selector => {
                const liveNode = document.querySelector(selector);
                const sourceNode = sourceDoc.querySelector(selector);
                if (liveNode && sourceNode) liveNode.innerHTML = sourceNode.innerHTML;
            });
        }
    </script>
</body>
</html>
