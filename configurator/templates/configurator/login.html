{% extends 'configurator/base.html' %}
{% block content %}
<div class="max-w-sm mx-auto rgb-border is-active glass-card rounded-2xl p-8 mt-16 relative">
    <h2 class="font-display text-xs font-bold mb-8 text-center text-white uppercase tracking-widest">// ავტორიზაციის პანელი</h2>

    <form method="POST" data-bypass-ajax class="space-y-5">
        {% csrf_token %}
        {% for field in form %}
            <div class="flex flex-col gap-2">
                <label class="text-[10px] text-fx-inkDim data-text uppercase tracking-wider">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <span class="text-[10px] text-fx-red data-text mt-0.5 uppercase tracking-wide">{{ field.errors.0 }}</span>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="w-full rgb-btn font-display py-3.5 text-xs uppercase tracking-widest rounded-xl mt-4">შესვლა</button>
    </form>

    <div class="text-[10px] text-center text-fx-inkDim mt-8 data-text border-t border-fx-border pt-4 uppercase tracking-wider">
        არ გაქვს პროფილი? <a href="{% url 'register' %}" class="text-fx-cyan hover:underline">რეგისტრაცია</a>
    </div>
</div>

<script>
    document.querySelectorAll('input').forEach(i => {
        i.className = "w-full bg-fx-bg border border-fx-border rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-fx-cyan data-text transition-colors placeholder-fx-inkDim/40";
    });
</script>
{% endblock %}
